name: Generate Bootstrap ZIP

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Arquitectura'
        required: true
        default: 'aarch64'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Permisos para crear un Release de GitHub con el ZIP adjunto
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apuntar al apt repo propio de com.sucu.dl
        run: |
          # Verificar que el package name ya está correcto
          grep 'TERMUX_APP__PACKAGE_NAME="com.sucu.dl"' scripts/properties.sh \
            || (echo "ERROR: package name incorrecto" && exit 1)

          # Aquí necesitamos encontrar cómo se llaman las variables
          # del repo en esta versión del archivo y actualizarlas
          # para apuntar a nuestro GitHub Pages
          grep -n "REPO.*URL\|REPO.*NAME\|packages.*termux" scripts/properties.sh \
            | head -30

      - name: Generar el bootstrap ZIP
        run: |
          ./scripts/run-docker.sh ./scripts/generate-bootstraps.sh \
            --architectures "${{ github.event.inputs.arch }}" \
            2>&1 | tee bootstrap.log

      - name: Subir bootstrap como artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ github.event.inputs.arch }}
          path: bootstrap-*.zip
          retention-days: 30

      - name: Crear GitHub Release con el bootstrap
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bootstrap-${{ github.run_number }}
          name: "Bootstrap com.sucu.dl #${{ github.run_number }}"
          files: bootstrap-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
