name: Build Packages for com.sucu.dl

on:
  # Solo se dispara manualmente desde la pestaña Actions
  # Esto evita compilaciones accidentales que consuman minutos
  workflow_dispatch:
    inputs:
      packages:
        description: 'Paquetes a compilar, separados por coma'
        required: true
        # python y ffmpeg + algunas dependencias comunes que necesitan
        default: 'python,ffmpeg'
      arch:
        description: 'Arquitectura objetivo'
        required: true
        default: 'aarch64'

jobs:
  build:
    runs-on: ubuntu-latest
    # Los paquetes de Termux tardan mucho — necesitamos el límite máximo
    timeout-minutes: 360

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar que el package name es correcto
        run: |
          # Solo una verificación de seguridad antes de compilar
          grep 'TERMUX_APP__PACKAGE_NAME="com.sucu.dl"' scripts/properties.sh \
            || (echo "ERROR: El package name no es com.sucu.dl" && exit 1)

      - name: Instalar componentes del Android SDK necesarios
        run: |
          # El SDK ya está en el runner pero faltan estas versiones específicas
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          
          # Aceptar licencias automáticamente
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || true
          
          # Instalar las versiones que termux-am necesita
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;30.0.3"

      - name: Compilar paquetes dentro de Docker
        run: |
          IFS=',' read -ra PKGS <<< "${{ github.event.inputs.packages }}"
          for pkg in "${PKGS[@]}"; do
            echo "========================================"
            echo "Compilando: $pkg para com.sucu.dl"
            echo "========================================"
            # TERMUX_PACKAGES_OFFLINE=true evita que el build system
            # intente descargar o compilar dependencias Java/Android
            # como termux-am que requieren un SDK preconfigurado
            ./scripts/run-docker.sh \
              bash -c "TERMUX_PACKAGES_OFFLINE=true ./build-package.sh \
                -a ${{ github.event.inputs.arch }} \
                -s \
                '$pkg'" \
              2>&1
          done

      - name: Guardar los .deb generados como artifact
        uses: actions/upload-artifact@v4
        with:
          # El nombre incluye la arch para identificarlos fácilmente
          name: debs-${{ github.event.inputs.arch }}
          path: debs/
          # Mantener los artifacts 30 días
          retention-days: 30
