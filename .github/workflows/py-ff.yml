name: Build Packages for com.sucu.dl

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Paquetes a compilar, separados por coma'
        required: true
        default: 'python,ffmpeg'
      arch:
        description: 'Arquitectura objetivo'
        required: true
        default: 'aarch64'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar package name
        run: |
          grep 'TERMUX_APP__PACKAGE_NAME="com.sucu.dl"' scripts/properties.sh \
            || (echo "ERROR: package name incorrecto" && exit 1)
          echo "✓ Package name correcto: com.sucu.dl"

       - name: Instalar dependencias del sistema
         run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            binutils curl libtool pkg-config \
            python3 python3-pip python3-requests \
            bison flex gawk gettext git \
            tar unzip zip patchelf jq \
            openjdk-17-jdk-headless

          # Encontrar dónde está Java realmente instalado en este runner
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          echo "Java encontrado en: $JAVA_PATH"
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Instalar Android SDK y NDK via setup-android-sdk.sh
        run: |
          # Este es el script oficial de Termux para preparar el entorno
          # Instala el NDK en la versión exacta que properties.sh espera
          bash scripts/setup-android-sdk.sh
        env:
          # Forzar instalación no interactiva
          DEBIAN_FRONTEND: noninteractive

      - name: Compilar paquetes
        run: |
          IFS=',' read -ra PKGS <<< "${{ github.event.inputs.packages }}"
          for pkg in "${PKGS[@]}"; do
            pkg=$(echo "$pkg" | xargs)  # trim espacios
            echo "========================================"
            echo "Compilando: $pkg para com.sucu.dl"
            echo "========================================"
            # Sin run-docker.sh — directamente en el runner
            # -f: forzar rebuild
            # -a: arquitectura
            bash build-package.sh \
              -a "${{ github.event.inputs.arch }}" \
              -f \
              "$pkg" \
              2>&1
          done

      - name: Guardar .deb como artifact
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ github.event.inputs.arch }}
          path: debs/
          retention-days: 30
