name: Publish APT Repository

on:
  workflow_dispatch:
    inputs:
      codespace_url:
        description: 'URL pública del puerto 8080 de tu Codespace (ej: https://...app.github.dev)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar herramientas apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev apt-utils wget

      - name: Descargar debs desde el Codespace
        run: |
          mkdir -p ./extracted/aarch64/debs
          # Descarga recursiva de todos los .deb ignorando la estructura de carpetas del server
          wget -r -np -nd -A "*.deb" "${{ github.event.inputs.codespace_url }}" -P ./extracted/aarch64/debs/
          
          echo "Archivos descargados:"
          ls ./extracted/aarch64/debs/

      - name: Construir estructura del repositorio apt
        run: |
          # Definir arquitectura principal
          arch="aarch64"
          DEB_DIR="./extracted/${arch}/debs"
          
          if [ ! -d "$DEB_DIR" ] || [ -z "$(ls -A $DEB_DIR)" ]; then
            echo "Error: No se encontraron archivos .deb descargados."
            exit 1
          fi

          POOL_DIR="./site/apt/termux-main/pool/main"
          PKG_DIR="./site/apt/termux-main/dists/stable/main/binary-${arch}"
          mkdir -p "$POOL_DIR" "$PKG_DIR"

          # Copiar todos los .deb al pool
          cp "$DEB_DIR"/*.deb "$POOL_DIR/"

          # Generar índice Packages
          # Usamos cd para que las rutas en el archivo Packages sean relativas a la raíz del repo
          cd ./site/apt/termux-main
          dpkg-scanpackages --multiversion pool/main > "dists/stable/main/binary-${arch}/Packages"
          gzip -9c "dists/stable/main/binary-${arch}/Packages" > "dists/stable/main/binary-${arch}/Packages.gz"
          cd -

          # Crear archivo Release
          cat > ./site/apt/termux-main/dists/stable/Release <<EOF
          Origin: SucuDL-Repository
          Label: SucuDL
          Suite: stable
          Codename: stable
          Architectures: aarch64
          Components: main
          Description: Packages for com.sucu.dl
          EOF

          echo "Estructura del repositorio generada exitosamente."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
