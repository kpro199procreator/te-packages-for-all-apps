name: Publish APT Repository

on:
  workflow_dispatch:
    inputs:
      codespace_url:
        description: "URL pública del puerto 8080 de tu Codespace"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar herramientas
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev apt-utils wget

      - name: Descargar paquetes .deb
        run: |
          mkdir -p extracted/aarch64/debs
          wget -r -np -nd -A "*.deb" "${{ github.event.inputs.codespace_url }}" -P extracted/aarch64/debs/

          echo "Archivos descargados:"
          ls extracted/aarch64/debs/ || true

      - name: Construir repositorio APT
        run: |
          set -e

          ARCH="aarch64"
          BASE="site/apt/termux-main"
          POOL="$BASE/pool/main"
          DIST="$BASE/dists/stable/main/binary-$ARCH"
          DEB_DIR="extracted/$ARCH/debs"

          if [ ! -d "$DEB_DIR" ] || [ -z "$(ls -A $DEB_DIR)" ]; then
            echo "No hay paquetes .deb"
            exit 1
          fi

          mkdir -p "$POOL" "$DIST"

          # Copiar paquetes
          cp "$DEB_DIR"/*.deb "$POOL/"

          # Generar Packages
          cd "$BASE"
          dpkg-scanpackages --multiversion pool/main > "dists/stable/main/binary-$ARCH/Packages"
          gzip -9c "dists/stable/main/binary-$ARCH/Packages" > "dists/stable/main/binary-$ARCH/Packages.gz"

          # Configuración Release
          cat > apt.conf <<EOF
          APT::FTPArchive::Release {
          Origin "SucuDL-Repository";
          Label "SucuDL";
          Suite "stable";
          Codename "stable";
          Architectures "$ARCH";
          Components "main";
          Description "Packages for com.sucu.dl";
           };
          EOF

          # Generar Release válido
          apt-ftparchive -c apt.conf release dists/stable > dists/stable/Release

          cd -

          echo "Repositorio generado correctamente"

      - name: Subir a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
