name: Publish APT Repository

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID del workflow Build Packages (el número del run, ej: 24015151775)'
        required: true
      sha:
        description: 'SHA del commit usado en ese run (ej: c04d7cfbf09e3b5da8cd666a136f41d9cc746487)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar herramientas apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Descargar debs desde Codespaces
        run: |
          mkdir -p ./extracted/aarch64/debs
          # Sustituye con la URL pública de tu puerto 8080 de Codespaces
          URL="https://tu-codespace-8080.app.github.dev"
          wget -r -np -nd -A "*.deb" $URL/ -P ./extracted/aarch64/debs/


      - name: Construir estructura del repositorio apt
        run: |
          for arch in aarch64 arm i686 x86_64; do
            DEB_DIR="./extracted/${arch}/debs"
            if [ ! -d "$DEB_DIR" ]; then
              echo "No hay debs para $arch, saltando..."
              continue
            fi

            POOL_DIR="./site/apt/termux-main/pool/main"
            PKG_DIR="./site/apt/termux-main/dists/stable/main/binary-${arch}"
            mkdir -p "$POOL_DIR" "$PKG_DIR"

            # Copiar .deb al pool
            find "$DEB_DIR" -name "*.deb" -exec cp {} "$POOL_DIR/" \;

            # Generar índice Packages para esta arch
            cd ./site/apt/termux-main
            dpkg-scanpackages --multiversion pool/main \
              | grep -v "^Filename: .*pool/main/.*" \
              | sed "s|^Filename: pool/main/|Filename: pool/main/|" \
              > "dists/stable/main/binary-${arch}/Packages"
            gzip -k "dists/stable/main/binary-${arch}/Packages"
            cd -
          done

          # Release file general
          cat > ./site/apt/termux-main/dists/stable/Release <<EOF
          Origin: te-packages-for-all-apps
          Label: te-packages-for-all-apps
          Suite: stable
          Codename: stable
          Architectures: aarch64 arm i686 x86_64
          Components: main
          Description: Packages for com.sucu.dl
          EOF

          echo "Estructura generada:"
          find ./site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
